<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Codex Factory Kit Cover</title>
  <desc id="desc">A visual cover for the Codex Factory Kit repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>
  <g fill="none" stroke="none">
    <circle cx="200" cy="140" r="110" fill="url(#panel)" opacity="0.25"/>
    <circle cx="1220" cy="460" r="130" fill="url(#panel)" opacity="0.22"/>
    <rect x="360" y="120" width="680" height="320" rx="28" fill="rgba(15, 23, 42, 0.72)" stroke="rgba(226, 232, 240, 0.35)" stroke-width="2"/>
    <rect x="420" y="170" width="520" height="70" rx="16" fill="url(#panel)" opacity="0.9"/>
    <text x="680" y="223" fill="#0f172a" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="36" font-weight="700">Codex Factory Kit</text>
    <text x="680" y="285" fill="#e2e8f0" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="500">A Workflow Kit for Practical Codex Sessions</text>
    <text x="680" y="330" fill="#f8fafc" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="400">Context, Planning, Review, QA, and Handoff Built In</text>
    <line x1="440" y1="370" x2="920" y2="370" stroke="#94a3b8" stroke-width="2"/>
    <text x="680" y="415" fill="#cbd5e1" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" letter-spacing="0.5" font-weight="500">quickstart • install • plan • router • release</text>
  </g>
</svg>
